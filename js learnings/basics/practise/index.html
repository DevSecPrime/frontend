      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* Form Container */
      form {
        background-color: #ffffff;
        padding: 25px 30px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      /* Inputs */
      form input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        transition: 0.2s;
      }

      /* Focus effect */
      form input[type="text"]:focus {
        border-color: #007bff;
        outline: none;
      }

      /* Submit Button */
      form input[type="submit"] {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        font-size: 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      /* Hover effect */
      form input[type="submit"]:hover {
        background-color: #0056b3;
      }

      .card {
        margin-top: 20px;
        padding: 20px;
        width: 300px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 10px;
      }
    </style>
